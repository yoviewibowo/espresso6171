<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ESPRESSO - Eksplorasi Spasial Persebaran Usaha dan Online Shop</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:#f8f5f1;
    color:#4b382a;
}

/* SPLASH */

#splash{
    position:fixed;
    inset:0;
    z-index:99999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f7e7d7,#ead2b7);
    transition:1s;
}

.logo-circle{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#8b5e3c;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

#splash h1{
    margin-top:20px;
    font-size:38px;
    letter-spacing:2px;
    color:#6f4e37;
}

#splash p{
    margin-top:10px;
    font-size:14px;
    opacity:.8;
}

.loader{
    width:180px;
    height:6px;
    margin-top:25px;
    background:#e0c7ab;
    border-radius:20px;
    overflow:hidden;
}

.loader span{
    display:block;
    width:40%;
    height:100%;
    background:#8b5e3c;
    animation:loading 1.3s infinite;
}

@keyframes loading{
    0%{margin-left:-40%;}
    100%{margin-left:100%;}
}

/* APP */

#app{
    display:none;
    width:100%;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:380px;
    overflow-y:auto;
    background:#fffaf5;
    border-right:1px solid #eadfd2;
    box-shadow:2px 0 10px rgba(0,0,0,.05);
}

.sidebar-header{
    padding:24px;
    color:white;
    background:linear-gradient(135deg,#8b5e3c,#b87b4b);
}

.sidebar-header h2{
    font-size:30px;
}

.sidebar-header p{
    margin-top:6px;
    font-size:13px;
    opacity:.9;
}

.filter-box{
    padding:20px;
}

.filter-box input,
.filter-box select{
    width:100%;
    border:none;
    outline:none;
    padding:12px 14px;
    margin-bottom:12px;
    border-radius:14px;
    background:#f3ece6;
    font-size:14px;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:0 20px 20px;
}

.card{
    background:white;
    padding:18px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.card h3{
    font-size:13px;
    opacity:.7;
}

.card p{
    margin-top:8px;
    font-size:24px;
    font-weight:700;
    color:#8b5e3c;
}

/* TOP KEC */

.top-kecamatan{
    margin:0 20px 20px;
    background:white;
    padding:18px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.top-kecamatan h3{
    font-size:14px;
    margin-bottom:12px;
}

.top-kecamatan-item{
    padding:10px 0;
    border-bottom:1px solid #eee;
    font-size:13px;
    display:flex;
    justify-content:space-between;
}

/* LIST */

.list-container{
    padding:0 20px 20px;
}

.merchant-card{
    background:white;
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.merchant-card:hover{
    transform:translateY(-3px);
}

.merchant-card h4{
    font-size:15px;
    margin-bottom:6px;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    background:#f2dfcf;
    color:#8b5e3c;
    font-size:11px;
    margin-top:8px;
}

/* MAP */

.map-container{
    flex:1;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

.topbar{
    position:absolute;
    top:18px;
    left:18px;
    z-index:999;
    background:white;
    padding:12px 18px;
    border-radius:16px;
    box-shadow:0 5px 20px rgba(0,0,0,.12);
}

.topbar h3{
    font-size:16px;
    color:#6f4e37;
}

/* POPUP */

.leaflet-popup-content-wrapper{
    border-radius:18px;
}

.popup-title{
    font-weight:700;
    margin-bottom:8px;
    color:#6f4e37;
}

.popup-detail{
    font-size:13px;
    margin-bottom:4px;
}

/* CLUSTER */

.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large{
    background:transparent !important;
}

.marker-cluster div{
    border:none !important;
}

/* HILANGKAN KOTAK HITAM */

.leaflet-markercluster-cover{
    display:none !important;
}

.leaflet-cluster polygon{
    display:none !important;
}

path.leaflet-interactive{
    outline:none !important;
}

/* TOOLTIP */

.leaflet-tooltip{
    background:white;
    border:none;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    padding:10px 12px;
    font-family:'Poppins',sans-serif;
}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash">

    <div class="logo-circle">☕</div>

    <h1>ESPRESSO</h1>

    <p>Eksplorasi Spasial Persebaran Usaha dan Online Shop</p>

    <div class="loader">
        <span></span>
    </div>

</div>

<!-- APP -->

<div id="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="sidebar-header">
            <h2>ESPRESSO</h2>
            <p>Visualisasi Geotag Merchant Online</p>
        </div>

        <div class="filter-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Cari merchant..."
            >

            <select id="categoryFilter">
                <option value="">Semua Kategori</option>
            </select>

            <select id="kecamatanFilter">
                <option value="">Semua Kecamatan</option>
            </select>

        </div>

        <!-- STATS -->

        <div class="stats">

            <div class="card">
                <h3>Total Merchant</h3>
                <p id="totalMerchant">0</p>
            </div>

            <div class="card">
                <h3>Total Kecamatan</h3>
                <p id="totalKec">0</p>
            </div>

        </div>

        <!-- TOP KEC -->

        <div class="top-kecamatan">

            <h3>🏆 Kecamatan Terbanyak</h3>

            <div id="topKecamatanList"></div>

        </div>

        <!-- LIST -->

        <div class="list-container" id="merchantList"></div>

    </div>

    <!-- MAP -->

    <div class="map-container">

        <div class="topbar">
            <h3>☕ ESPRESSO Mapping Dashboard</h3>
        </div>

        <div id="map"></div>

    </div>

</div>

<!-- LIBRARY -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

/* SPLASH */

setTimeout(() => {

    document.getElementById('splash').style.opacity = 0;

    setTimeout(() => {

        document.getElementById('splash').style.display = 'none';

        document.getElementById('app').style.display = 'flex';

        map.invalidateSize();

    },1000);

},2000);


/* MAP */

const map = L.map('map').setView(
    [-0.0263,109.3425],
    12
);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution:'© OpenStreetMap'
    }
).addTo(map);


/* CLUSTER */

const markerCluster =
L.markerClusterGroup({

    maxClusterRadius:35,

    showCoverageOnHover:false,

    polygonOptions:{
        stroke:false,
        fill:false
    },

    spiderfyOnMaxZoom:true,

    disableClusteringAtZoom:17,

    iconCreateFunction:function(cluster){

        const count =
            cluster.getChildCount();

        let color = '#8b5e3c';

        if(count < 20){
            color = '#c8a27a';
        }
        else if(count < 100){
            color = '#a47148';
        }

        return L.divIcon({

            html:`
                <div style="
                    background:${color};
                    width:42px;
                    height:42px;
                    border-radius:50%;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    color:white;
                    font-weight:700;
                    border:4px solid rgba(255,255,255,.7);
                    box-shadow:0 4px 10px rgba(0,0,0,.15);
                ">
                    ${count}
                </div>
            `,

            className:'',

            iconSize:[42,42]

        });

    }

});

map.addLayer(markerCluster);


/* DATA */

const SHEET_ID =
'1Dl0vLTb6jeDDmpSg1kLUzMLmxz_XI-4JxW3rNcmThWU';

const SHEET_NAME =
'grabgojek';

const sheetURL =
`https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

const geojsonURL =
'https://raw.githubusercontent.com/yoviewibowo/repowilkerstat6171/main/final_sls_6171_2025-1.geojson';


/* VARIABLE */

let merchantData = [];
let markers = [];
let geojsonData;


/* LOAD */

async function loadData(){

    try{

        const [sheetRes,geoRes] = await Promise.all([

            fetch(sheetURL),

            fetch(geojsonURL)

        ]);

        merchantData =
            await sheetRes.json();

        geojsonData =
            await geoRes.json();

        renderGeoJSON();

        renderMerchant();

        populateFilters();

        renderList(merchantData);

        updateStats(merchantData);

        renderTopKecamatan(merchantData);

    }catch(err){

        console.error(err);

        alert('Gagal memuat data.');

    }

}


/* GEOJSON */

function renderGeoJSON(){

    L.geoJSON(geojsonData,{

        style:{
            color:'#8b5e3c',
            weight:1,
            fillColor:'#d9b38c',
            fillOpacity:0.03
        },

        onEachFeature:function(feature,layer){

            layer.on({

                mouseover:function(e){

                    e.target.setStyle({
                        weight:2,
                        fillOpacity:0.12
                    });

                    const usahaDalamPolygon =
                        merchantData.filter(item => {

                        const lat =
                            parseFloat(item.latitude);

                        const lng =
                            parseFloat(item.longitude);

                        if(isNaN(lat) || isNaN(lng))
                            return false;

                        const point =
                            turf.point([lng,lat]);

                        return turf.booleanPointInPolygon(
                            point,
                            feature
                        );

                    });

                    const namaSLS =
                        feature.properties.nmsls ||
                        feature.properties.sls ||
                        '-';

                    let isiUsaha = '';

                    usahaDalamPolygon
                    .slice(0,5)
                    .forEach(x => {

                        isiUsaha +=
                        `• ${x.restaurant_name}<br>`;

                    });

                    if(usahaDalamPolygon.length > 5){

                        isiUsaha +=
                        `<br>+ ${
                            usahaDalamPolygon.length - 5
                        } usaha lainnya`;

                    }

                    layer.bindTooltip(`

                        <b>${namaSLS}</b><br>

                        Total Usaha:
                        ${usahaDalamPolygon.length}

                        <hr>

                        ${isiUsaha}

                    `,{
                        sticky:true
                    }).openTooltip();

                },

                mouseout:function(e){

                    e.target.setStyle({
                        weight:1,
                        fillOpacity:0.03
                    });

                    layer.closeTooltip();

                }

            });

        }

    }).addTo(map);

}


/* MARKER */

function renderMerchant(){

    merchantData.forEach(item => {

        const lat =
            parseFloat(item.latitude);

        const lng =
            parseFloat(item.longitude);

        if(isNaN(lat) || isNaN(lng))
            return;


        const foodIcon = L.divIcon({

            html:`
                <div style="
                    width:20px;
                    height:20px;
                    border-radius:50%;
                    background:#8b5e3c;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    color:white;
                    font-size:9px;
                    box-shadow:0 2px 6px rgba(0,0,0,.2);
                ">
                    <i class="fa-solid fa-utensils"></i>
                </div>
            `,

            className:'',

            iconSize:[20,20],

            iconAnchor:[10,10]

        });


        const marker = L.marker(
            [lat,lng],
            {
                icon:foodIcon
            }
        );


        marker.bindPopup(`

            <div class="popup-title">
                ${item.restaurant_name}
            </div>

            <div class="popup-detail">
                <b>Platform:</b>
                ${item.platform}
            </div>

            <div class="popup-detail">
                <b>Rating:</b>
                ${item.rating || '-'}
            </div>

            <div class="popup-detail">
                <b>Kategori:</b>
                ${item.category || '-'}
            </div>

            <div class="popup-detail">
                <b>Kecamatan:</b>
                ${item.nmkec || '-'}
            </div>

            <div class="popup-detail">
                <b>Alamat:</b>
                ${item.address || '-'}
            </div>

        `);

        markerCluster.addLayer(marker);

        item.marker = marker;

        markers.push(marker);

    });

}


/* FILTER */

function populateFilters(){

    const categories = [

        ...new Set(

            merchantData.flatMap(item => {

                if(!item.category) return [];

                return item.category
                    .split('|')
                    .map(cat => cat.trim());

            })

        )

    ];


    const kecamatan = [

        ...new Set(

            merchantData
            .map(x => x.nmkec)
            .filter(Boolean)

        )

    ];


    const categoryFilter =
        document.getElementById(
            'categoryFilter'
        );

    const kecamatanFilter =
        document.getElementById(
            'kecamatanFilter'
        );


    categories.sort().forEach(cat => {

        categoryFilter.innerHTML += `
            <option value="${cat}">
                ${cat}
            </option>
        `;

    });


    kecamatan.sort().forEach(kec => {

        kecamatanFilter.innerHTML += `
            <option value="${kec}">
                ${kec}
            </option>
        `;

    });

}


/* LIST */

function renderList(data){

    const container =
        document.getElementById(
            'merchantList'
        );

    container.innerHTML = '';

    data.forEach(item => {

        const card =
            document.createElement('div');

        card.className =
            'merchant-card';

        card.innerHTML = `

            <h4>
                ${item.restaurant_name}
            </h4>

            <div style="
                font-size:13px;
                margin-bottom:6px;
            ">
                ⭐ ${item.rating || '-'}
            </div>

            <div style="
                font-size:12px;
            ">
                ${item.nmkec || '-'}
            </div>

            <div class="badge">
                ${item.category || 'UMKM'}
            </div>

        `;

        card.onclick = () => {

            map.setView(
                [
                    parseFloat(item.latitude),
                    parseFloat(item.longitude)
                ],
                18
            );

            item.marker.openPopup();

        };

        container.appendChild(card);

    });

}


/* STATS */

function updateStats(data){

    document.getElementById(
        'totalMerchant'
    ).innerText =
        data.length;

    const kec = [

        ...new Set(
            data.map(x => x.nmkec)
        )

    ];

    document.getElementById(
        'totalKec'
    ).innerText =
        kec.length;

}


/* TOP KEC */

function renderTopKecamatan(data){

    const topContainer =
        document.getElementById(
            'topKecamatanList'
        );

    topContainer.innerHTML = '';

    const count = {};

    data.forEach(item => {

        if(!count[item.nmkec]){

            count[item.nmkec] = 0;

        }

        count[item.nmkec]++;

    });


    const sorted = Object.entries(count)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);


    sorted.forEach(item => {

        topContainer.innerHTML += `

            <div class="top-kecamatan-item">

                <span>${item[0]}</span>

                <b>${item[1]}</b>

            </div>

        `;

    });

}


/* APPLY FILTER */

function applyFilter(){

    const search =
        document.getElementById(
            'searchInput'
        )
        .value
        .toLowerCase();

    const category =
        document.getElementById(
            'categoryFilter'
        ).value;

    const kec =
        document.getElementById(
            'kecamatanFilter'
        ).value;


    const filtered =
        merchantData.filter(item => {

        return (

            item.restaurant_name
            .toLowerCase()
            .includes(search)

            &&

            (
                category === ''
                ||

                (
                    item.category &&
                    item.category.includes(category)
                )
            )

            &&

            (
                kec === ''
                ||
                item.nmkec === kec
            )

        );

    });


    markerCluster.clearLayers();


    filtered.forEach(item => {

        markerCluster.addLayer(
            item.marker
        );

    });


    updateStats(filtered);

    renderTopKecamatan(filtered);

    renderList(filtered);

}


/* EVENT */

document
.getElementById('searchInput')
.addEventListener(
    'input',
    applyFilter
);

document
.getElementById('categoryFilter')
.addEventListener(
    'change',
    applyFilter
);

document
.getElementById('kecamatanFilter')
.addEventListener(
    'change',
    applyFilter
);


/* START */

loadData();

</script>

</body>
</html>
